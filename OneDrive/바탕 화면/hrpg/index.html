<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카드 RPG - 온라인 멀티플레이어</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <!-- 로그인 화면 -->
    <div id="auth-screen" class="screen active">
        <div class="auth-container">
            <h1>카드 RPG</h1>
            <p class="subtitle">온라인 멀티플레이어 카드게임</p>
            
            <div class="auth-tabs">
                <button class="tab-btn active" data-tab="login">로그인</button>
                <button class="tab-btn" data-tab="signup">회원가입</button>
            </div>

            <!-- 로그인 폼 -->
            <form id="login-form" class="auth-form active">
                <input type="email" id="login-email" placeholder="이메일" required>
                <input type="password" id="login-password" placeholder="비밀번호" required>
                <button type="submit" class="btn btn-primary">로그인</button>
                <div id="login-error" class="error-message"></div>
            </form>

            <!-- 회원가입 폼 -->
            <form id="signup-form" class="auth-form">
                <input type="text" id="signup-username" placeholder="닉네임" required>
                <input type="email" id="signup-email" placeholder="이메일" required>
                <input type="password" id="signup-password" placeholder="비밀번호" required>
                <input type="password" id="signup-password-confirm" placeholder="비밀번호 확인" required>
                <button type="submit" class="btn btn-primary">회원가입</button>
                <div id="signup-error" class="error-message"></div>
            </form>
        </div>
    </div>

    <!-- 메인 화면 -->
    <div id="main-screen" class="screen">
        <div class="main-container">
            <!-- 헤더 -->
            <header class="main-header">
                <div class="player-info">
                    <span id="player-name" class="player-name"></span>
                    <span id="player-level" class="player-level">Lv. 1</span>
                </div>
                <div class="header-actions">
                    <button id="settings-btn" class="icon-btn" title="설정">⚙️</button>
                    <button id="logout-btn" class="icon-btn" title="로그아웃">🚪</button>
                </div>
            </header>

            <!-- 메인 메뉴 -->
            <div class="menu-container">
                <h2>메인 메뉴</h2>
                <button class="btn btn-large" id="play-1v1-btn">1v1 게임</button>
                <button class="btn btn-large" id="play-1v1v1-btn">1v1v1 게임</button>
                <button class="btn btn-large" id="deck-btn">덱 편성</button>
                <button class="btn btn-large" id="inventory-btn">인벤토리</button>
                <button class="btn btn-large" id="stats-btn">통계</button>
            </div>
        </div>
    </div>

    <!-- 게임 화면 (1v1) -->
    <div id="game-1v1-screen" class="screen">
        <div class="game-1v1-container">
            <!-- 상대방 손패 (가려짐) -->
            <div class="opponent-hand-area">
                <div class="opponent-info">
                    <span id="opponent-name-1v1" class="opponent-name">상대방</span>
                    <div class="health-bar">
                        <div class="health-fill" id="opponent-health-1v1" style="width: 100%"></div>
                    </div>
                    <span id="opponent-health-text-1v1" class="health-text">100/100</span>
                </div>
                <div class="hand-stack" id="opponent-hand-1v1"></div>
            </div>

            <!-- 중앙 필드 (더미 카드) -->
            <div class="center-field">
                <div class="field-row" id="field-1v1"></div>
                <div class="turn-indicator" id="turn-indicator-1v1">당신의 턴</div>
            </div>

            <!-- 자신의 손패 -->
            <div class="player-hand-area">
                <div class="hand-stack" id="player-hand-1v1"></div>
                <div class="player-info">
                    <span id="player-name-1v1" class="player-name">플레이어</span>
                    <div class="health-bar">
                        <div class="health-fill" id="player-health-1v1" style="width: 100%"></div>
                    </div>
                    <span id="player-health-text-1v1" class="health-text">100/100</span>
                </div>
            </div>

            <!-- 게임 액션 -->
            <div class="game-actions">
                <button class="btn btn-action" id="end-turn-btn-1v1">턴 종료</button>
                <button class="btn btn-action" id="surrender-btn-1v1">항복</button>
                <button class="btn btn-action" id="back-btn-1v1">메뉴</button>
            </div>
        </div>
    </div>

    <!-- 게임 화면 (1v1v1) -->
    <div id="game-1v1v1-screen" class="screen">
        <div class="game-1v1v1-container">
            <!-- 좌상단 상대방 1 -->
            <div class="opponent-area top-left">
                <div class="opponent-info">
                    <span id="opponent1-name" class="opponent-name">상대방 1</span>
                    <div class="health-bar">
                        <div class="health-fill" id="opponent1-health" style="width: 100%"></div>
                    </div>
                    <span id="opponent1-health-text" class="health-text">100/100</span>
                </div>
                <div class="hand-stack" id="opponent1-hand"></div>
            </div>

            <!-- 우상단 상대방 2 -->
            <div class="opponent-area top-right">
                <div class="opponent-info">
                    <span id="opponent2-name" class="opponent-name">상대방 2</span>
                    <div class="health-bar">
                        <div class="health-fill" id="opponent2-health" style="width: 100%"></div>
                    </div>
                    <span id="opponent2-health-text" class="health-text">100/100</span>
                </div>
                <div class="hand-stack" id="opponent2-hand"></div>
            </div>

            <!-- 중앙 필드 -->
            <div class="center-field-3p">
                <div class="field-row" id="field-1v1v1"></div>
                <div class="turn-indicator" id="turn-indicator-1v1v1">당신의 턴</div>
            </div>

            <!-- 하단 자신의 손패 -->
            <div class="player-area-3p">
                <div class="hand-stack" id="player-hand-1v1v1"></div>
                <div class="player-info">
                    <span id="player-name-1v1v1" class="player-name">플레이어</span>
                    <div class="health-bar">
                        <div class="health-fill" id="player-health-1v1v1" style="width: 100%"></div>
                    </div>
                    <span id="player-health-text-1v1v1" class="health-text">100/100</span>
                </div>
            </div>

            <!-- 게임 액션 -->
            <div class="game-actions">
                <button class="btn btn-action" id="end-turn-btn-1v1v1">턴 종료</button>
                <button class="btn btn-action" id="surrender-btn-1v1v1">항복</button>
                <button class="btn btn-action" id="back-btn-1v1v1">메뉴</button>
            </div>
        </div>
    </div>

    <!-- 토스트 알림 -->
    <div id="toast-container" class="toast-container"></div>

    <!-- 모달 -->
    <div id="modal-overlay" class="modal-overlay">
        <div id="modal-content" class="modal-content"></div>
    </div>

    <script src="js/supabase-client.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/cards.js"></script>
    <script src="js/game.js"></script>
    <script src="js/multiplayer.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
